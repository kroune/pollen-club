name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon

  test-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
      # :shared:allTests builds native test targets, which use the Kotlin/Native
      # toolchain in ~/.konan (not covered by setup-gradle). See build-ios for details.
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-kotlin-2.3.20
          restore-keys: konan-${{ runner.os }}-
      - name: Run shared module tests
        run: ./gradlew :shared:allTests --no-daemon

  test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
      - name: Run Android unit tests
        run: ./gradlew :androidApp:testDebugUnitTest -PexcludeScreenshots --no-daemon

  screenshot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
      - name: Verify Roborazzi screenshots
        run: ./gradlew :androidApp:verifyRoborazziDebug --no-daemon
      - name: Upload Roborazzi diff on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diff
          path: androidApp/build/outputs/roborazzi/
          retention-days: 14

  build-ios:
    # Compose Multiplatform 1.11.x links against the iOS 26 SDK (references
    # symbols like UIViewLayoutRegion), so it needs Xcode 26 — macos-latest
    # still ships Xcode 16.x.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
      # Kotlin/Native toolchain + prebuilt platform caches live in ~/.konan, which
      # setup-gradle does NOT cache. Without this they are re-downloaded/rebuilt every
      # run. Key on the Kotlin version so a bump invalidates cleanly (bump when the
      # `kotlin` version in gradle/libs.versions.toml changes).
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-kotlin-2.3.20
          restore-keys: konan-${{ runner.os }}-
      # Device target only — the simulator framework is compiled by
      # embedAndSignAppleFrameworkForXcode inside the xcodebuild step below, so
      # compiling it here too would be redundant. iosArm64 is the one target
      # xcodebuild does not exercise, so we still verify it links.
      - name: Compile shared framework (device target)
        run: ./gradlew :shared:compileKotlinIosArm64 --no-daemon
      - name: Build iOS app (simulator, no signing)
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios-derived \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build
