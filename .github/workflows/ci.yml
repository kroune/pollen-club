name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Run shared module tests
        run: ./gradlew :shared:allTests

      - name: Run Android unit tests
        run: ./gradlew :androidApp:testDebugUnitTest

      - name: Verify Roborazzi screenshots
        run: ./gradlew :androidApp:verifyRoborazziDebug

      - name: Upload Roborazzi diff on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diff
          path: androidApp/build/outputs/roborazzi/
          retention-days: 14

  compile-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile shared for iOS
        run: ./gradlew :shared:compileKotlinIosArm64
