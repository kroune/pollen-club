<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Pollen App · Wireframe Exploration</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { margin: 0; background: #f0eee9; font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-detail.jsx"></script>
<script type="text/babel" src="screens-diary.jsx"></script>
<script type="text/babel" src="screens-therapy.jsx"></script>
<script type="text/babel" src="screens-misc.jsx"></script>
<script type="text/babel" src="screens-home-v2.jsx"></script>
<script type="text/babel" src="screens-detail-v2.jsx"></script>
<script type="text/babel" src="screens-diary-v2.jsx"></script>
<script type="text/babel" src="screens-therapy-v2.jsx"></script>
<script type="text/babel" src="screens-home-v3.jsx"></script>
<script type="text/babel" src="screens-detail-v3.jsx"></script>
<script type="text/babel" src="screens-diary-v3.jsx"></script>
<script type="text/babel" src="screens-therapy-v3.jsx"></script>
<script type="text/babel" src="screens-v4.jsx"></script>
<script type="text/babel" src="screens-therapy-v5.jsx"></script>
<script type="text/babel" src="screens-therapy-v6.jsx"></script>
<script type="text/babel" src="screens-map-v2.jsx"></script>
<script type="text/babel" src="screens-map-v3.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const ART_W = 316, ART_H = 660;
  return (
    <DesignCanvas>

      <DCSection id="intro" title="Pollen — UI redesign" subtitle="Mid-fi wireframes · calm clinical direction · 1 accent (мох) + 6-step severity scale · Russian copy preserved">
        <DCArtboard id="legend" label="Система · цвет, тип, шкала" width={ART_W} height={ART_H}>
          <div style={{ padding: 22, fontFamily: 'Inter, system-ui', height: '100%', boxSizing: 'border-box' }}>
            <div style={{ fontFamily: 'Fraunces, serif', fontSize: 22, letterSpacing: -0.4, marginBottom: 4 }}>Pollen redesign</div>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 9, letterSpacing: 1.4, color: '#8a948f', textTransform: 'uppercase', marginBottom: 18 }}>Wireframe system · v1</div>

            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 9, letterSpacing: 1.4, color: '#8a948f', textTransform: 'uppercase', marginBottom: 6 }}>Шкала пыления</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginBottom: 16 }}>
              {[
                { l: 'Нулевой', c: '#c9d3cd' },
                { l: 'Низкий', c: '#7fa86a' },
                { l: 'Средний', c: '#d9b94a' },
                { l: 'Высокий', c: '#d97a3a' },
                { l: 'Очень высокий', c: '#c44545' },
                { l: 'Экстра', c: '#7d3a8a' },
              ].map(s => (
                <div key={s.l} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 11 }}>
                  <div style={{ width: 14, height: 14, borderRadius: 3, background: s.c }} />
                  <div>{s.l}</div>
                </div>
              ))}
            </div>

            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 9, letterSpacing: 1.4, color: '#8a948f', textTransform: 'uppercase', marginBottom: 6 }}>Типографика</div>
            <div style={{ fontFamily: 'Fraunces, serif', fontSize: 28, lineHeight: 1, letterSpacing: -0.6 }}>Берёза</div>
            <div style={{ fontFamily: 'Inter', fontSize: 13, color: '#4a5450', marginTop: 4 }}>Inter — UI / тело / списки</div>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, color: '#8a948f', marginTop: 4 }}>JetBrains Mono — labels, цифры, метки</div>

            <div style={{ height: 1, background: '#ebeeec', margin: '14px 0' }} />
            <div style={{ fontSize: 11, lineHeight: 1.5, color: '#4a5450' }}>
              Все макеты — оригинальный дизайн, основанный на тех же данных, что и существующее API: аллергены, уровни (0-5), фенологические стадии, симптомы, препараты, фото-фид, карта рисков.
            </div>
          </div>
        </DCArtboard>

        <DCArtboard id="orig" label="Исходник · ссылка" width={ART_W} height={ART_H}>
          <div style={{ padding: 22, fontFamily: 'Inter', fontSize: 12, color: '#4a5450', height: '100%', boxSizing: 'border-box' }}>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 9, letterSpacing: 1.4, color: '#8a948f', textTransform: 'uppercase' }}>Исходный UI</div>
            <div style={{ marginTop: 8, fontFamily: 'Fraunces, serif', fontSize: 18, color: '#1a1d1c', letterSpacing: -0.3 }}>Что не так в текущем приложении</div>
            <ul style={{ paddingLeft: 16, marginTop: 12, lineHeight: 1.6 }}>
              <li>Тёмно-синяя сине-зелёная палитра — не «здоровье»</li>
              <li>Бирюзовый акцент конфликтует с шкалой пыления</li>
              <li>Сложный паттерн «таблица → список → карточка»</li>
              <li>Нижняя навигация с 5 непонятными иконками</li>
              <li>Сообщество и медиа спрятаны за чат-иконкой</li>
              <li>На главном экране нет ответа «что мне делать сейчас»</li>
            </ul>
            <div style={{ height: 1, background: '#ebeeec', margin: '14px 0' }} />
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 9, letterSpacing: 1.4, color: '#8a948f', textTransform: 'uppercase' }}>Что сохранено</div>
            <ul style={{ paddingLeft: 16, marginTop: 8, lineHeight: 1.6 }}>
              <li>Все аллергены (10) и шкала 0-5</li>
              <li>Прогноз ±7 дней</li>
              <li>Фенологические стадии</li>
              <li>Дневник: симптомы + терапия по зонам</li>
              <li>Карта рисков с фильтрами</li>
              <li>Лента сообщества: новости / лента / друзья / медиа</li>
            </ul>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="home" title="Главный" subtitle="Персональный индекс «по вашим аллергенам» + точки 1–5 для каждого. Дата дедуплицирована.">
        <DCArtboard id="home-c3v3" label="Главная" width={ART_W} height={ART_H}><HomeC3v3 /></DCArtboard>
      </DCSection>

      <DCSection id="sensitivity" title="Чувствительность" subtitle="Настройка: какие аллергены и насколько сильно влияют на персональный индекс.">
        <DCArtboard id="sens-v3" label="Чувствительность" width={ART_W} height={ART_H}><SensitivityV3 /></DCArtboard>
      </DCSection>

      <DCSection id="detail" title="Детали аллергена" subtitle="Edge-to-edge график пыления. «Самочувствие» — вторая линия, можно скрыть.">
        <DCArtboard id="det-a4" label="График + 2-я линия самочувствия" width={ART_W} height={ART_H}><DetailA4 /></DCArtboard>
      </DCSection>

      <DCSection id="diary" title="Дневник · самочувствие + симптомы" subtitle="Дата = заголовок (без дублирующего app-bar). Силуэт + терапия на одном экране.">
        <DCArtboard id="dia-v4a" label="A · Дата = заголовок" width={ART_W} height={ART_H}><DiaryV4A /></DCArtboard>
      </DCSection>

      <DCSection id="therapy" title="Терапия · A3 — шторка снизу" subtitle="T4 — стек аватаров в свёрнутом виде, карточки с заметками в раскрытом. Без времени — только по дню.">
        <DCArtboard id="the-t4c" label="T4 свёрнуто · стек аватаров" width={ART_W} height={ART_H}><TherapyT4Collapsed /></DCArtboard>
        <DCArtboard id="the-t4e" label="T4 раскрыто · карточки с заметкой" width={ART_W} height={ART_H}><TherapyT4Expanded /></DCArtboard>
      </DCSection>

      <DCSection id="ther-form" title="Терапия · форма препарата" subtitle="Детали приёма: название, форма, доза, частота.">
        <DCArtboard id="ther-form" label="Форма (детали)" width={ART_W} height={ART_H}><TherapyForm /></DCArtboard>
      </DCSection>

      <DCSection id="pheno" title="Фенология · наблюдения" subtitle="Логирование стадий цветения для других пользователей.">
        <DCArtboard id="pheno-a" label="Шкала стадий" width={ART_W} height={ART_H}><PhenoA /></DCArtboard>
      </DCSection>

      <DCSection id="feed" title="Сообщество · лента" subtitle="Новости / лента / друзья / медиа — в одной ленте с фильтрами.">
        <DCArtboard id="feed-a" label="Объединённая лента" width={ART_W} height={ART_H}><FeedA /></DCArtboard>
      </DCSection>

      <DCSection id="map" title="Карта рисков" subtitle="Карта на весь экран. Фильтры сверху, аллерген чипом ниже, шкала уровня — колонкой справа.">
        <DCArtboard id="map-n4" label="Карта" width={ART_W} height={ART_H}><MapN4 /></DCArtboard>
      </DCSection>

      <DCSection id="ref" title="Справочник аллергенов" subtitle="Энциклопедия растений с фотографиями и описанием.">
        <DCArtboard id="ref-a" label="Справочник" width={ART_W} height={ART_H}><ReferenceA /></DCArtboard>
      </DCSection>

      <DCSection id="settings" title="Настройки · меню" subtitle="Язык, основной аллерген, регион, друзья, выход.">
        <DCArtboard id="set-a" label="Меню" width={ART_W} height={ART_H}><SettingsA /></DCArtboard>
      </DCSection>

      <DCSection id="onboarding" title="Онбординг" subtitle="Выбор основного аллергена при первом запуске.">
        <DCArtboard id="onb-a" label="Выбор аллергена" width={ART_W} height={ART_H}><OnboardA /></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
