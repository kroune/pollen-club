<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Pollen · Справочник — Exploration</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="polished/styles.css" />
<style>
  body { margin: 0; background: #f0eee9; font-family: 'DM Sans', system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="polished/tweaks-panel.jsx"></script>
<script type="text/babel" src="polished/shared.jsx"></script>
<script type="text/babel" src="polished/index-variants.jsx"></script>
<script type="text/babel" src="polished/screens-home.jsx"></script>
<script type="text/babel" src="polished/screens-detail.jsx"></script>
<script type="text/babel" src="polished/screens-diary.jsx"></script>
<script type="text/babel" src="polished/screens-therapy.jsx"></script>
<script type="text/babel" src="polished/screens-misc.jsx"></script>
<script type="text/babel" src="polished/screens-ref-variants.jsx"></script>

<script type="text/babel" data-presets="react">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "fontUI": "DM Sans",
  "fontDisplay": "Lora",
  "accent": "#26873c",
  "accent2": "#2a5e40",
  "paper": "#f7f6f2",
  "paper2": "#efeee9",
  "cardBg": "#ffffff",
  "sev1": "#6ea85c",
  "sev2": "#e5a50a",
  "sev3": "#d4713a",
  "sev4": "#c43d3d",
  "sev5": "#7a3590",
}/*EDITMODE-END*/;

const FONT_OPTIONS = [
  'DM Sans',
  'Helvetica Neue',
  'Manrope',
  'Nunito',
  'Source Sans 3',
  'Plus Jakarta Sans',
  'Outfit',
  'Figtree',
  'Geist',
  'Onest',
  'General Sans',
  'Satoshi',
  'Switzer',
  'Cabinet Grotesk',
  'Instrument Sans',
  'Bricolage Grotesque',
  'Sora',
  'Wix Madefor Display',
  'Albert Sans',
  'Red Hat Display',
  'Urbanist',
  'Lexend',
  'Be Vietnam Pro',
];
const DISPLAY_FONT_OPTIONS = [
  'Newsreader',
  'Lora',
  'Playfair Display',
  'DM Serif Display',
  'Source Serif 4',
  'Fraunces',
  'Literata',
  'Crimson Pro',
  'Bitter',
  'Libre Baskerville',
  'Merriweather',
  'Spectral',
  'Vollkorn',
  'Noto Serif',
  'IBM Plex Serif',
  'Cormorant Garamond',
  'Brygada 1918',
  'Instrument Serif',
  'Young Serif',
];

// Dynamically load Google Fonts for selected options
function useGoogleFont(family) {
  React.useEffect(() => {
    if (!family || family === 'Helvetica Neue') return;
    const id = 'gf-' + family.replace(/\s/g, '-');
    if (document.getElementById(id)) return;
    const link = document.createElement('link');
    link.id = id;
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:wght@400;500;600;700&display=swap`;
    document.head.appendChild(link);
  }, [family]);
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useGoogleFont(t.fontUI);
  useGoogleFont(t.fontDisplay);

  // Apply tweaks to CSS variables
  React.useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty('--font-ui', `'${t.fontUI}', system-ui, sans-serif`);
    r.setProperty('--font-display', `'${t.fontDisplay}', Georgia, serif`);
    r.setProperty('--accent', t.accent);
    r.setProperty('--accent-2', t.accent2);
    r.setProperty('--accent-light', t.accent + '14');
    r.setProperty('--paper', t.paper);
    r.setProperty('--paper-2', t.paper2);
    r.setProperty('--card', t.cardBg);
    r.setProperty('--severity-1', t.sev1);
    r.setProperty('--severity-2', t.sev2);
    r.setProperty('--severity-3', t.sev3);
    r.setProperty('--severity-4', t.sev4);
    r.setProperty('--severity-5', t.sev5);
  }, [t]);
  const ART_W = 316, ART_H = 660;
  return (
    <>
    <DesignCanvas>

      <DCSection id="current" title="Текущий вариант" subtitle="← назад inline с поисковой строкой">
        <DCArtboard id="ref-cur" label="Текущий" width={ART_W} height={ART_H}><PReference /></DCArtboard>
      </DCSection>

      <DCSection id="ref-a" title="A · Заголовок + поиск" subtitle="Крупный заголовок, полная строка поиска, без кнопки «назад» — возврат через системную навигацию">
        <DCArtboard id="ref-a" label="Заголовок + поиск" width={ART_W} height={ART_H}><PRefA /></DCArtboard>
      </DCSection>

      <DCSection id="ref-b" title="B · Компактный хедер-бар" subtitle="Центрированный заголовок, ← в pill-кнопке слева, поиск-иконка справа — аккуратный toolbar">
        <DCArtboard id="ref-b" label="Хедер-бар" width={ART_W} height={ART_H}><PRefB /></DCArtboard>
      </DCSection>

      <DCSection id="ref-c" title="C · Категории + иконка поиска" subtitle="Заголовок + пиллы категорий (Деревья, Злаки, Грибки…), поиск свёрнут в иконку — навигация внутри справочника">
        <DCArtboard id="ref-c" label="Категории" width={ART_W} height={ART_H}><PRefC /></DCArtboard>
      </DCSection>

      <DCSection id="ref-d" title="D · Справочник как таб" subtitle="Отдельный таб в нижней навигации — кнопка «назад» не нужна вовсе">
        <DCArtboard id="ref-d" label="Таб в навигации" width={ART_W} height={ART_H}><PRefD /></DCArtboard>
      </DCSection>

      <DCSection id="ref-e" title="E · Алфавитный список" subtitle="Вертикальный список вместо сетки, группировка по буквам, sticky-поиск — лучше для длинных каталогов">
        <DCArtboard id="ref-e" label="Список + алфавит" width={ART_W} height={ART_H}><PRefE /></DCArtboard>
      </DCSection>

      <DCSection id="ref-f" title="F · Модальный шит" subtitle="Справочник как bottom sheet поверх предыдущего экрана — закрытие по × или свайпу вниз">
        <DCArtboard id="ref-f" label="Bottom sheet" width={ART_W} height={ART_H}><PRefF /></DCArtboard>
      </DCSection>

    </DesignCanvas>

    <TweaksPanel>
      <TweakSection label="Шрифты" />
      <TweakSelect label="UI шрифт" value={t.fontUI}
        options={FONT_OPTIONS}
        onChange={(v) => setTweak('fontUI', v)} />
      <TweakSelect label="Дисплейный шрифт" value={t.fontDisplay}
        options={DISPLAY_FONT_OPTIONS}
        onChange={(v) => setTweak('fontDisplay', v)} />

      <TweakSection label="Цвета акцента" />
      <TweakColor label="Основной акцент" value={t.accent}
        onChange={(v) => setTweak('accent', v)} />
      <TweakColor label="Акцент тёмный" value={t.accent2}
        onChange={(v) => setTweak('accent2', v)} />

      <TweakSection label="Фон" />
      <TweakColor label="Фон (paper)" value={t.paper}
        onChange={(v) => setTweak('paper', v)} />
      <TweakColor label="Фон вторичный" value={t.paper2}
        onChange={(v) => setTweak('paper2', v)} />
      <TweakColor label="Карточки" value={t.cardBg}
        onChange={(v) => setTweak('cardBg', v)} />

      <TweakSection label="Шкала пыления" />
      <TweakColor label="Низкий" value={t.sev1}
        onChange={(v) => setTweak('sev1', v)} />
      <TweakColor label="Средний" value={t.sev2}
        onChange={(v) => setTweak('sev2', v)} />
      <TweakColor label="Высокий" value={t.sev3}
        onChange={(v) => setTweak('sev3', v)} />
      <TweakColor label="Очень высокий" value={t.sev4}
        onChange={(v) => setTweak('sev4', v)} />
      <TweakColor label="Экстра" value={t.sev5}
        onChange={(v) => setTweak('sev5', v)} />
    </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
