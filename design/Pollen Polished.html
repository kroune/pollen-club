<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Pollen · Polished Design</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="polished/styles.css" />
<style>
  body { margin: 0; background: #f0eee9; font-family: 'DM Sans', system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="polished/tweaks-panel.jsx"></script>
<script type="text/babel" src="polished/shared.jsx"></script>
<script type="text/babel" src="polished/index-variants.jsx"></script>
<script type="text/babel" src="polished/screens-home.jsx"></script>
<script type="text/babel" src="polished/screens-detail.jsx"></script>
<script type="text/babel" src="polished/screens-diary.jsx"></script>
<script type="text/babel" src="polished/screens-therapy.jsx"></script>
<script type="text/babel" src="polished/screens-misc.jsx"></script>

<script type="text/babel" data-presets="react">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "fontUI": "DM Sans",
  "fontDisplay": "Lora",
  "accent": "#26873c",
  "accent2": "#2a5e40",
  "paper": "#f7f6f2",
  "paper2": "#efeee9",
  "cardBg": "#ffffff",
  "sev1": "#6ea85c",
  "sev2": "#e5a50a",
  "sev3": "#d4713a",
  "sev4": "#c43d3d",
  "sev5": "#7a3590",
}/*EDITMODE-END*/;

const FONT_OPTIONS = [
  'DM Sans',
  'Helvetica Neue',
  'Manrope',
  'Nunito',
  'Source Sans 3',
  'Plus Jakarta Sans',
  'Outfit',
  'Figtree',
  'Geist',
  'Onest',
  'General Sans',
  'Satoshi',
  'Switzer',
  'Cabinet Grotesk',
  'Instrument Sans',
  'Bricolage Grotesque',
  'Sora',
  'Wix Madefor Display',
  'Albert Sans',
  'Red Hat Display',
  'Urbanist',
  'Lexend',
  'Be Vietnam Pro',
];
const DISPLAY_FONT_OPTIONS = [
  'Newsreader',
  'Lora',
  'Playfair Display',
  'DM Serif Display',
  'Source Serif 4',
  'Fraunces',
  'Literata',
  'Crimson Pro',
  'Bitter',
  'Libre Baskerville',
  'Merriweather',
  'Spectral',
  'Vollkorn',
  'Noto Serif',
  'IBM Plex Serif',
  'Cormorant Garamond',
  'Brygada 1918',
  'Instrument Serif',
  'Young Serif',
];

// Dynamically load Google Fonts for selected options
function useGoogleFont(family) {
  React.useEffect(() => {
    if (!family || family === 'Helvetica Neue') return;
    const id = 'gf-' + family.replace(/\s/g, '-');
    if (document.getElementById(id)) return;
    const link = document.createElement('link');
    link.id = id;
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:wght@400;500;600;700&display=swap`;
    document.head.appendChild(link);
  }, [family]);
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useGoogleFont(t.fontUI);
  useGoogleFont(t.fontDisplay);

  // Apply tweaks to CSS variables
  React.useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty('--font-ui', `'${t.fontUI}', system-ui, sans-serif`);
    r.setProperty('--font-display', `'${t.fontDisplay}', Georgia, serif`);
    r.setProperty('--accent', t.accent);
    r.setProperty('--accent-2', t.accent2);
    r.setProperty('--accent-light', t.accent + '14');
    r.setProperty('--paper', t.paper);
    r.setProperty('--paper-2', t.paper2);
    r.setProperty('--card', t.cardBg);
    r.setProperty('--severity-1', t.sev1);
    r.setProperty('--severity-2', t.sev2);
    r.setProperty('--severity-3', t.sev3);
    r.setProperty('--severity-4', t.sev4);
    r.setProperty('--severity-5', t.sev5);
  }, [t]);
  const ART_W = 316, ART_H = 660;
  return (
    <>
    <DesignCanvas>

      <DCSection id="system" title="Дизайн-система" subtitle="DM Sans + Newsreader · refined severity palette · shadow-based card depth · moss green accent">
        <DCArtboard id="legend" label="Токены и система" width={ART_W} height={ART_H}>
          <div style={{ padding: 24, fontFamily: 'var(--font-ui)', height: '100%', boxSizing: 'border-box', background: 'var(--paper)' }}>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 24, fontWeight: 500, letterSpacing: -0.4, marginBottom: 2 }}>Pollen</div>
            <div className="p-eyebrow" style={{ marginBottom: 20 }}>Polished design · v1</div>

            <div className="p-eyebrow" style={{ marginBottom: 8 }}>Шкала пыления</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 5, marginBottom: 20 }}>
              {[
                { l: 'Нулевой', n: 0 },
                { l: 'Низкий', n: 1 },
                { l: 'Средний', n: 2 },
                { l: 'Высокий', n: 3 },
                { l: 'Очень высокий', n: 4 },
                { l: 'Экстра', n: 5 },
              ].map(s => (
                <div key={s.l} style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 12 }}>
                  <div className={'sev-dot sev-dot-' + s.n} />
                  <div style={{ fontWeight: 500 }}>{s.l}</div>
                </div>
              ))}
            </div>

            <div className="p-eyebrow" style={{ marginBottom: 8 }}>Типографика</div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 30, fontWeight: 500, lineHeight: 1, letterSpacing: -0.6 }}>Берёза</div>
            <div style={{ fontFamily: 'var(--font-ui)', fontSize: 13, color: 'var(--ink-2)', marginTop: 6 }}>DM Sans — UI, тело, списки</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', marginTop: 4 }}>JetBrains Mono — labels, цифры</div>

            <div style={{ height: 1, background: 'var(--line-2)', margin: '16px 0' }} />

            <div className="p-eyebrow" style={{ marginBottom: 8 }}>Акцент</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--accent)' }} />
              <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--accent-2)' }} />
              <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--accent-light)', border: '1px solid var(--line-2)' }} />
            </div>

            <div style={{ height: 1, background: 'var(--line-2)', margin: '16px 0' }} />
            <div style={{ fontSize: 11, lineHeight: 1.55, color: 'var(--ink-2)' }}>
              Финальная версия: карточки с тенями вместо обводок, улучшенная иерархия типографики, увеличенные отступы для touch-целей.
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="home" title="Главная" subtitle="Персональный индекс, дневной стрип, список аллергенов">
        <DCArtboard id="home" label="Главная" width={ART_W} height={ART_H}><PHome /></DCArtboard>
      </DCSection>

      <DCSection id="sensitivity" title="Чувствительность" subtitle="Настройка влияния аллергенов на индекс">
        <DCArtboard id="sens" label="Чувствительность" width={ART_W} height={ART_H}><PSensitivity /></DCArtboard>
      </DCSection>

      <DCSection id="detail" title="Детали аллергена" subtitle="График пыления + наложение самочувствия">
        <DCArtboard id="detail" label="Берёза · график" width={ART_W} height={ART_H}><PDetail /></DCArtboard>
      </DCSection>

      <DCSection id="diary" title="Дневник" subtitle="Дата-заголовок, настроение, силуэт тела, терапия — всё на одном экране">
        <DCArtboard id="diary" label="Дневник" width={ART_W} height={ART_H}><PDiary /></DCArtboard>
      </DCSection>

      <DCSection id="therapy" title="Терапия" subtitle="Выбор препарата: шторка снизу (свёрнуто / раскрыто)">
        <DCArtboard id="ther-c" label="Свёрнуто · стек аватаров" width={ART_W} height={ART_H}><PTherapyCollapsed /></DCArtboard>
        <DCArtboard id="ther-e" label="Раскрыто · карточки" width={ART_W} height={ART_H}><PTherapyExpanded /></DCArtboard>
      </DCSection>

      <DCSection id="ther-form" title="Форма препарата" subtitle="Детали: название, форма, доза, частота">
        <DCArtboard id="ther-form" label="Форма (детали)" width={ART_W} height={ART_H}><PTherapyForm /></DCArtboard>
      </DCSection>

      <DCSection id="pheno" title="Фенология" subtitle="Стадии цветения">
        <DCArtboard id="pheno" label="Фенология" width={ART_W} height={ART_H}><PPheno /></DCArtboard>
      </DCSection>

      <DCSection id="feed" title="Сообщество" subtitle="Единая лента с фильтрами">
        <DCArtboard id="feed" label="Лента" width={ART_W} height={ART_H}><PFeed /></DCArtboard>
      </DCSection>

      <DCSection id="map" title="Карта рисков" subtitle="Полноэкранная карта, чипы фильтров, шкала уровня">
        <DCArtboard id="map" label="Карта" width={ART_W} height={ART_H}><PMap /></DCArtboard>
      </DCSection>

      <DCSection id="ref" title="Справочник" subtitle="Энциклопедия аллергенов">
        <DCArtboard id="ref" label="Справочник" width={ART_W} height={ART_H}><PReference /></DCArtboard>
      </DCSection>

      <DCSection id="settings" title="Настройки" subtitle="Профиль, язык, регион">
        <DCArtboard id="settings" label="Настройки" width={ART_W} height={ART_H}><PSettings /></DCArtboard>
      </DCSection>

      <DCSection id="onboarding" title="Онбординг" subtitle="Выбор аллергена при первом запуске">
        <DCArtboard id="onboard" label="Выбор аллергена" width={ART_W} height={ART_H}><POnboard /></DCArtboard>
      </DCSection>

    </DesignCanvas>

    <TweaksPanel>
      <TweakSection label="Шрифты" />
      <TweakSelect label="UI шрифт" value={t.fontUI}
        options={FONT_OPTIONS}
        onChange={(v) => setTweak('fontUI', v)} />
      <TweakSelect label="Дисплейный шрифт" value={t.fontDisplay}
        options={DISPLAY_FONT_OPTIONS}
        onChange={(v) => setTweak('fontDisplay', v)} />

      <TweakSection label="Цвета акцента" />
      <TweakColor label="Основной акцент" value={t.accent}
        onChange={(v) => setTweak('accent', v)} />
      <TweakColor label="Акцент тёмный" value={t.accent2}
        onChange={(v) => setTweak('accent2', v)} />

      <TweakSection label="Фон" />
      <TweakColor label="Фон (paper)" value={t.paper}
        onChange={(v) => setTweak('paper', v)} />
      <TweakColor label="Фон вторичный" value={t.paper2}
        onChange={(v) => setTweak('paper2', v)} />
      <TweakColor label="Карточки" value={t.cardBg}
        onChange={(v) => setTweak('cardBg', v)} />

      <TweakSection label="Шкала пыления" />
      <TweakColor label="Низкий" value={t.sev1}
        onChange={(v) => setTweak('sev1', v)} />
      <TweakColor label="Средний" value={t.sev2}
        onChange={(v) => setTweak('sev2', v)} />
      <TweakColor label="Высокий" value={t.sev3}
        onChange={(v) => setTweak('sev3', v)} />
      <TweakColor label="Очень высокий" value={t.sev4}
        onChange={(v) => setTweak('sev4', v)} />
      <TweakColor label="Экстра" value={t.sev5}
        onChange={(v) => setTweak('sev5', v)} />
    </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
